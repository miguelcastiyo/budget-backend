openapi: 3.1.0
info:
  title: Budget API
  version: 1.0.0
  description: Session-based API contract for the budget app backend.
servers:
  - url: /api/v1
    description: v1 base path
security:
  - cookieAuth: []
  - sessionTokenAuth: []
  - masterApiKeyAuth: []
tags:
  - name: Auth
  - name: Profile
  - name: ApiKeys
  - name: Tags
  - name: Cards
  - name: Recurring
  - name: BudgetSettings
  - name: Transactions
  - name: Metrics
  - name: ImportExport
paths:
  /auth/invitations:
    post:
      tags: [Auth]
      summary: Create an invite
      description: Requires owner/admin privileges.
      security:
        - cookieAuth: []
        - sessionTokenAuth: []
      parameters:
        - $ref: '#/components/parameters/XCsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInviteRequest'
      responses:
        '201':
          description: Invite created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InviteResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '422':
          $ref: '#/components/responses/ValidationError'

  /auth/invitations/accept-password:
    post:
      tags: [Auth]
      summary: Accept invite with email/password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AcceptInvitePasswordRequest'
      responses:
        '201':
          description: User created and session issued
          headers:
            Set-Cookie:
              schema:
                type: string
              description: Set when client_type is web
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSessionResponse'
        '409':
          $ref: '#/components/responses/ConflictError'
        '422':
          $ref: '#/components/responses/ValidationError'

  /auth/invitations/accept-google:
    post:
      tags: [Auth]
      summary: Accept invite with Google
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AcceptInviteGoogleRequest'
      responses:
        '201':
          description: User created and session issued
          headers:
            Set-Cookie:
              schema:
                type: string
              description: Set when client_type is web
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSessionResponse'
        '409':
          $ref: '#/components/responses/ConflictError'
        '422':
          $ref: '#/components/responses/ValidationError'

  /auth/sessions/password:
    post:
      tags: [Auth]
      summary: Sign in with email/password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordSignInRequest'
      responses:
        '200':
          description: Signed in
          headers:
            Set-Cookie:
              schema:
                type: string
              description: Set when client_type is web
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSessionResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '422':
          $ref: '#/components/responses/ValidationError'

  /auth/sessions/google:
    post:
      tags: [Auth]
      summary: Sign in with Google
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GoogleSignInRequest'
      responses:
        '200':
          description: Signed in
          headers:
            Set-Cookie:
              schema:
                type: string
              description: Set when client_type is web
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSessionResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '422':
          $ref: '#/components/responses/ValidationError'

  /auth/sessions/current:
    delete:
      tags: [Auth]
      summary: Sign out current session
      parameters:
        - $ref: '#/components/parameters/XCsrfToken'
      responses:
        '204':
          description: Session invalidated
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /me:
    get:
      tags: [Profile]
      summary: Get profile
      responses:
        '200':
          description: Profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Profile'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
    patch:
      tags: [Profile]
      summary: Update display name
      parameters:
        - $ref: '#/components/parameters/XCsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Profile'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '422':
          $ref: '#/components/responses/ValidationError'

  /me/email-change/request:
    post:
      tags: [Profile]
      summary: Request email change (password users only)
      description: Rate limited.
      parameters:
        - $ref: '#/components/parameters/XCsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestEmailChangeRequest'
      responses:
        '202':
          description: Verification pending
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailChangeRequestedResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '422':
          $ref: '#/components/responses/ValidationError'

  /me/email-change/verify:
    post:
      tags: [Profile]
      summary: Verify email change code
      description: Rate limited.
      parameters:
        - $ref: '#/components/parameters/XCsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyEmailChangeRequest'
      responses:
        '200':
          description: Email updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailChangeVerifiedResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '422':
          $ref: '#/components/responses/ValidationError'

  /me/auth/convert-google:
    post:
      tags: [Profile]
      summary: Convert current password account to Google sign-in
      description: Session auth only. The Google account email must match the current user email.
      security:
        - cookieAuth: []
        - sessionTokenAuth: []
      parameters:
        - $ref: '#/components/parameters/XCsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConvertAccountToGoogleRequest'
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Profile'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '409':
          $ref: '#/components/responses/ConflictError'
        '422':
          $ref: '#/components/responses/ValidationError'

  /me/master-api-keys:
    get:
      tags: [ApiKeys]
      summary: List master API keys (metadata only)
      description: Session auth only. Raw key values are never returned.
      security:
        - cookieAuth: []
        - sessionTokenAuth: []
      responses:
        '200':
          description: Master API key metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MasterApiKeyListResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
    post:
      tags: [ApiKeys]
      summary: Create a master API key
      description: Session auth only. Returns full key once at creation.
      security:
        - cookieAuth: []
        - sessionTokenAuth: []
      parameters:
        - $ref: '#/components/parameters/XCsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMasterApiKeyRequest'
      responses:
        '201':
          description: Master API key created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateMasterApiKeyResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '422':
          $ref: '#/components/responses/ValidationError'

  /me/master-api-keys/{api_key_id}:
    delete:
      tags: [ApiKeys]
      summary: Revoke a master API key
      description: Session auth only.
      security:
        - cookieAuth: []
        - sessionTokenAuth: []
      parameters:
        - $ref: '#/components/parameters/ApiKeyId'
        - $ref: '#/components/parameters/XCsrfToken'
      responses:
        '204':
          description: Key revoked
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /me/tags:
    get:
      tags: [Tags]
      summary: List tags
      responses:
        '200':
          description: Tags
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Tag'
                required: [items]
        '401':
          $ref: '#/components/responses/UnauthorizedError'
    post:
      tags: [Tags]
      summary: Create tag
      parameters:
        - $ref: '#/components/parameters/XCsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTagRequest'
      responses:
        '201':
          description: Tag created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tag'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '409':
          $ref: '#/components/responses/ConflictError'
        '422':
          $ref: '#/components/responses/ValidationError'

  /me/tags/{tag_id}:
    patch:
      tags: [Tags]
      summary: Update tag
      parameters:
        - $ref: '#/components/parameters/TagId'
        - $ref: '#/components/parameters/XCsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTagRequest'
      responses:
        '200':
          description: Tag updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tag'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/ConflictError'
        '422':
          $ref: '#/components/responses/ValidationError'
    delete:
      tags: [Tags]
      summary: Delete tag
      parameters:
        - $ref: '#/components/parameters/TagId'
        - $ref: '#/components/parameters/XCsrfToken'
      responses:
        '204':
          description: Tag deleted
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /me/cards:
    get:
      tags: [Cards]
      summary: List cards
      responses:
        '200':
          description: Cards
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Card'
                required: [items]
        '401':
          $ref: '#/components/responses/UnauthorizedError'
    post:
      tags: [Cards]
      summary: Create card
      parameters:
        - $ref: '#/components/parameters/XCsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateNamedEntityRequest'
      responses:
        '201':
          description: Card created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Card'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '409':
          $ref: '#/components/responses/ConflictError'
        '422':
          $ref: '#/components/responses/ValidationError'

  /me/cards/{card_id}:
    patch:
      tags: [Cards]
      summary: Update card
      parameters:
        - $ref: '#/components/parameters/CardId'
        - $ref: '#/components/parameters/XCsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateNamedEntityRequest'
      responses:
        '200':
          description: Card updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Card'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/ConflictError'
        '422':
          $ref: '#/components/responses/ValidationError'
    delete:
      tags: [Cards]
      summary: Delete card
      parameters:
        - $ref: '#/components/parameters/CardId'
        - $ref: '#/components/parameters/XCsrfToken'
      responses:
        '204':
          description: Card deleted
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /me/recurring-expenses:
    get:
      tags: [Recurring]
      summary: List recurring expenses
      parameters:
        - name: month
          in: query
          required: false
          schema:
            type: string
            pattern: '^\\d{4}-\\d{2}$'
      responses:
        '200':
          description: Recurring expenses + committed total for month
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecurringExpensesResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '422':
          $ref: '#/components/responses/ValidationError'
    post:
      tags: [Recurring]
      summary: Create recurring expense rule
      parameters:
        - $ref: '#/components/parameters/XCsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRecurringExpenseRequest'
      responses:
        '201':
          description: Recurring expense created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecurringExpense'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '422':
          $ref: '#/components/responses/ValidationError'

  /me/recurring-expenses/{recurring_expense_id}:
    patch:
      tags: [Recurring]
      summary: Update recurring expense rule
      parameters:
        - $ref: '#/components/parameters/RecurringExpenseId'
        - $ref: '#/components/parameters/XCsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRecurringExpenseRequest'
      responses:
        '200':
          description: Recurring expense updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecurringExpense'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '422':
          $ref: '#/components/responses/ValidationError'
    delete:
      tags: [Recurring]
      summary: Delete recurring expense rule
      parameters:
        - $ref: '#/components/parameters/RecurringExpenseId'
        - $ref: '#/components/parameters/XCsrfToken'
      responses:
        '204':
          description: Recurring expense deleted
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /me/budget-settings:
    get:
      tags: [BudgetSettings]
      summary: Get budget settings
      responses:
        '200':
          description: Budget settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BudgetSettings'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
    put:
      tags: [BudgetSettings]
      summary: Upsert budget settings
      parameters:
        - $ref: '#/components/parameters/XCsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/BudgetSettingsPercentInput'
                - $ref: '#/components/schemas/BudgetSettingsAmountInput'
      responses:
        '200':
          description: Budget settings saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BudgetSettings'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '422':
          $ref: '#/components/responses/ValidationError'

  /me/transactions:
    get:
      tags: [Transactions]
      summary: List transactions
      parameters:
        - $ref: '#/components/parameters/DateFrom'
        - $ref: '#/components/parameters/DateTo'
        - $ref: '#/components/parameters/Preset'
        - $ref: '#/components/parameters/SearchQuery'
        - $ref: '#/components/parameters/Categories'
        - $ref: '#/components/parameters/TagIds'
        - $ref: '#/components/parameters/CardIds'
        - $ref: '#/components/parameters/IsSplit'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
      responses:
        '200':
          description: Transaction list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionsPage'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '422':
          $ref: '#/components/responses/ValidationError'
    post:
      tags: [Transactions]
      summary: Create transaction
      parameters:
        - $ref: '#/components/parameters/XCsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTransactionRequest'
      responses:
        '201':
          description: Transaction created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transaction'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/ConflictError'
        '422':
          $ref: '#/components/responses/ValidationError'

  /me/transactions/{transaction_id}:
    patch:
      tags: [Transactions]
      summary: Update transaction
      parameters:
        - $ref: '#/components/parameters/TransactionId'
        - $ref: '#/components/parameters/XCsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTransactionRequest'
      responses:
        '200':
          description: Transaction updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transaction'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '422':
          $ref: '#/components/responses/ValidationError'
    delete:
      tags: [Transactions]
      summary: Delete transaction
      parameters:
        - $ref: '#/components/parameters/TransactionId'
        - $ref: '#/components/parameters/XCsrfToken'
      responses:
        '204':
          description: Transaction deleted
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /me/metrics/tags:
    get:
      tags: [Metrics]
      summary: Monthly tag spend metrics
      parameters:
        - $ref: '#/components/parameters/Month'
      responses:
        '200':
          description: Tag metrics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagMetricsResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '422':
          $ref: '#/components/responses/ValidationError'

  /me/metrics/categories:
    get:
      tags: [Metrics]
      summary: Monthly category budget vs actual
      parameters:
        - $ref: '#/components/parameters/Month'
      responses:
        '200':
          description: Category metrics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryMetricsResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '422':
          $ref: '#/components/responses/ValidationError'

  /me/metrics/insights:
    get:
      tags: [Metrics]
      summary: Aggregated insights metrics for a date range
      parameters:
        - $ref: '#/components/parameters/InsightsDateFrom'
        - $ref: '#/components/parameters/InsightsDateTo'
      responses:
        '200':
          description: Insights metrics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InsightsMetricsResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '422':
          $ref: '#/components/responses/ValidationError'

  /me/transactions/export.csv:
    get:
      tags: [ImportExport]
      summary: Export filtered transactions as CSV
      parameters:
        - $ref: '#/components/parameters/DateFrom'
        - $ref: '#/components/parameters/DateTo'
        - $ref: '#/components/parameters/Preset'
        - $ref: '#/components/parameters/SearchQuery'
        - $ref: '#/components/parameters/Categories'
        - $ref: '#/components/parameters/TagIds'
        - $ref: '#/components/parameters/CardIds'
        - $ref: '#/components/parameters/IsSplit'
        - $ref: '#/components/parameters/Sort'
      responses:
        '200':
          description: CSV file
          content:
            text/csv:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '422':
          $ref: '#/components/responses/ValidationError'

  /me/transactions/import.csv:
    post:
      tags: [ImportExport]
      summary: Import transactions from CSV
      parameters:
        - $ref: '#/components/parameters/XCsrfToken'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                mode:
                  type: string
                  enum: [dry_run, commit]
              required: [file, mode]
      responses:
        '200':
          description: Import result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CsvImportResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '422':
          $ref: '#/components/responses/ValidationError'

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: sid
    sessionTokenAuth:
      type: apiKey
      in: header
      name: Authorization
      description: Use format `Session <session_token>`.
    masterApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: Non-session master key for testing, format `bgtm_...`.

  parameters:
    XCsrfToken:
      name: X-CSRF-Token
      in: header
      required: false
      schema:
        type: string
      description: Required for non-GET requests when using cookie sessions.
    TagId:
      name: tag_id
      in: path
      required: true
      schema:
        type: string
    CardId:
      name: card_id
      in: path
      required: true
      schema:
        type: string
    RecurringExpenseId:
      name: recurring_expense_id
      in: path
      required: true
      schema:
        type: string
    TransactionId:
      name: transaction_id
      in: path
      required: true
      schema:
        type: string
    ApiKeyId:
      name: api_key_id
      in: path
      required: true
      schema:
        type: string
    Month:
      name: month
      in: query
      required: true
      schema:
        type: string
        pattern: '^\\d{4}-\\d{2}$'
    DateFrom:
      name: date_from
      in: query
      required: false
      schema:
        type: string
        format: date
    DateTo:
      name: date_to
      in: query
      required: false
      schema:
        type: string
        format: date
    InsightsDateFrom:
      name: date_from
      in: query
      required: true
      schema:
        type: string
        format: date
    InsightsDateTo:
      name: date_to
      in: query
      required: true
      schema:
        type: string
        format: date
    Preset:
      name: preset
      in: query
      required: false
      schema:
        type: string
        enum: [last_7_days, last_30_days, month_to_date, last_month, quarter_to_date]
    SearchQuery:
      name: q
      in: query
      required: false
      schema:
        type: string
        maxLength: 120
      description: Case-insensitive substring match against expense, tag name, and card name.
    Categories:
      name: categories
      in: query
      required: false
      schema:
        type: string
      description: Comma-separated category values.
    TagIds:
      name: tag_ids
      in: query
      required: false
      schema:
        type: string
      description: Comma-separated tag IDs.
    CardIds:
      name: card_ids
      in: query
      required: false
      schema:
        type: string
      description: Comma-separated card IDs.
    IsSplit:
      name: is_split
      in: query
      required: false
      schema:
        type: string
        enum: [split, not_split]
      description: Filter by split flag. Omit for all transactions.
    Page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: page_size
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
    Sort:
      name: sort
      in: query
      required: false
      schema:
        type: string
        enum: [date_desc, date_asc]

  responses:
    UnauthorizedError:
      description: Authentication required or invalid session.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    ForbiddenError:
      description: Action not allowed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    NotFoundError:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    ConflictError:
      description: Conflict with current state.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    ValidationError:
      description: Request validation failed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'


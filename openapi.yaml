            $ref: '#/components/schemas/InsightsLargestTransactionItem'
        recurring_vs_variable:
          $ref: '#/components/schemas/InsightsRecurringVsVariable'
      required:
        - date_from
        - date_to
        - months_in_range
        - total_spend
        - total_transactions
        - monthly_spend_trend
        - category_breakdown
        - category_budget_vs_actual
        - tag_breakdown
        - day_of_week_spend
        - largest_transactions
        - recurring_vs_variable

    CsvImportErrorItem:
      type: object
      properties:
        row:
          type: integer
          minimum: 1
        field:
          type: string
        message:
          type: string
      required: [row, field, message]

    CsvImportResponse:
      type: object
      properties:
        mode:
          type: string
          enum: [dry_run, commit]
        total_rows:
          type: integer
          minimum: 0
        valid_rows:
          type: integer
          minimum: 0
        imported_rows:
          type: integer
          minimum: 0
        duplicate_rows:
          type: integer
          minimum: 0
        invalid_rows:
          type: integer
          minimum: 0
        errors:
          type: array
          items:
            $ref: '#/components/schemas/CsvImportErrorItem'
      required: [mode, total_rows, valid_rows, imported_rows, duplicate_rows, invalid_rows, errors]

    ErrorDetail:
      type: object
      properties:
        field:
          type: string
        message:
          type: string
      required: [field, message]

    Error:
      type: object
      properties:
        code:
          type: string
          enum:
            - UNAUTHENTICATED
            - FORBIDDEN
            - NOT_FOUND
            - CONFLICT
            - VALIDATION_ERROR
            - RATE_LIMITED
            - INTERNAL_ERROR
        message:
          type: string
        details:
          type: array
          items:
            $ref: '#/components/schemas/ErrorDetail'
      required: [code, message]

    ErrorEnvelope:
      type: object
      properties:
        error:
          $ref: '#/components/schemas/Error'
      required: [error]

    CategoryEnum:
      type: string
      enum: [needs, wants, savings_debts]

    Money:
      type: string
      pattern: '^\\d+(\\.\\d{2})$'

    Percent:
      type: string
      pattern: '^\\d+(\\.\\d{2})$'
